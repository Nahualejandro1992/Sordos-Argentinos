<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Sordos Argentinos — Noticias</title>
<style>
  :root{
    --violeta-bg:#050014; --magenta:#ff2ec4; --cian:#17f2ff;
    --texto:#f4e9ff; --texto-dim:#b79ad1; --verde:#5bffa0; --amarillo:#f6b40e;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; overscroll-behavior:none; background:var(--violeta-bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  input{ font-size:16px; font-family:inherit; }

  #app{ position:fixed; inset:0; width:100vw; height:100dvh;
    padding-top:env(safe-area-inset-top); padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right);
    overflow:hidden; background:var(--violeta-bg); display:flex; flex-direction:column;
  }
  .fondo-aurora{ position:absolute; inset:0; z-index:0; pointer-events:none;
    background:linear-gradient(120deg, transparent 0%, #7209b7 20%, transparent 40%, #4361ee 60%, transparent 80%, var(--cian) 100%);
    background-size:300% 300%; opacity:.13; animation:auroraMove 9s ease-in-out infinite; }
  @keyframes auroraMove{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
  @media (prefers-reduced-motion: reduce){ .fondo-aurora{ animation:none; } }

  .header{ position:relative; z-index:1; padding:14px 20px 10px; flex-shrink:0; }
  .header-top{ display:flex; align-items:center; justify-content:space-between; }
  .header-top h1{ font-size:26px; font-weight:800; color:var(--texto); }
  .btn-icono{ width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.05); }
  .btn-icono svg{ width:18px; height:18px; color:var(--texto); }

  .buscador{ margin-top:12px; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.05);
    border:1.5px solid rgba(255,255,255,.1); border-radius:14px; padding:0 14px; min-height:42px; }
  .buscador svg{ width:16px; height:16px; color:var(--texto-dim); flex-shrink:0; }
  .buscador input{ flex:1; background:transparent; border:none; outline:none; color:var(--texto); min-height:42px; font-size:14px; }
  .buscador input::placeholder{ color:rgba(183,154,209,.55); }

  .filtros{ display:flex; gap:8px; margin-top:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
  .filtros::-webkit-scrollbar{ display:none; }
  .filtro-chip{ flex-shrink:0; min-height:32px; padding:0 14px; border-radius:16px; background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1); color:var(--texto-dim); font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px; }
  .filtro-chip.activo{ background:linear-gradient(135deg,var(--magenta),var(--cian)); color:#fff; border-color:transparent; }

  .lista-wrap{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; position:relative; z-index:1; }
  .lista{ padding:6px 20px 30px; display:flex; flex-direction:column; gap:12px; }

  .noticia-destacada{ border-radius:18px; overflow:hidden; position:relative; height:180px; background:linear-gradient(135deg,#2a1a3d,#12081f); }
  .noticia-destacada img{ width:100%; height:100%; object-fit:cover; position:absolute; inset:0; opacity:.55; }
  .noticia-destacada .overlay{ position:absolute; inset:0; background:linear-gradient(180deg, transparent 30%, rgba(5,0,20,.95) 100%); }
  .noticia-destacada .contenido-dest{ position:absolute; left:16px; right:16px; bottom:14px; }
  .tag-cat{ display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:8px;
    background:rgba(255,255,255,.12); color:#fff; text-transform:uppercase; letter-spacing:.3px; }
  .noticia-destacada h2{ margin-top:8px; font-size:17px; font-weight:800; color:#fff; line-height:1.3; }
  .noticia-destacada .meta{ margin-top:6px; font-size:11px; color:rgba(255,255,255,.7); }

  .noticia-card{ display:flex; gap:12px; border-radius:16px; padding:10px; background:rgba(255,255,255,.04); position:relative; }
  .noticia-card .miniatura{ width:78px; height:78px; border-radius:12px; flex-shrink:0; background:linear-gradient(135deg,#2a1a3d,#12081f);
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .noticia-card .miniatura img{ width:100%; height:100%; object-fit:cover; }
  .noticia-card .info{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .noticia-card h3{ font-size:13.5px; font-weight:700; color:var(--texto); line-height:1.35;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .noticia-card .meta{ margin-top:auto; padding-top:6px; display:flex; align-items:center; gap:8px; font-size:10.5px; color:var(--texto-dim); }
  .noticia-card .fuente{ font-weight:700; color:var(--cian); }
  .punto-led{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .punto-led.nuevo{ background:var(--magenta); box-shadow:0 0 6px 1px rgba(255,46,196,.7); animation:pulsoLed 1.6s ease-in-out infinite; }
  @keyframes pulsoLed{ 0%,100%{ opacity:.5; } 50%{ opacity:1; } }
  .btn-guardar-noticia{ position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%; background:rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center; }
  .btn-guardar-noticia svg{ width:13px; height:13px; color:#fff; }
  .btn-guardar-noticia.guardado svg{ color:var(--amarillo); fill:var(--amarillo); }

  .tabbar{ position:relative; z-index:1; display:flex; padding-bottom:env(safe-area-inset-bottom); background:rgba(10,0,24,.9);
    backdrop-filter:blur(14px); border-top:1px solid rgba(255,255,255,.06); flex-shrink:0; }
  .tab{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:9px 0 7px; color:var(--texto-dim); }
  .tab svg{ width:22px; height:22px; }
  .tab span{ font-size:10.5px; font-weight:700; }
  .tab.activo{ color:var(--cian); }

  /* ===== tarjeta de clima ===== */
  .clima-card{ border-radius:18px; padding:16px; background:linear-gradient(135deg,#1a0630,#0d1a3a); position:relative; overflow:hidden; margin-bottom:4px; }
  .clima-top{ display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; }
  .clima-lugar{ font-size:12.5px; color:var(--texto-dim); font-weight:600; }
  .clima-actualizado{ font-size:10px; color:var(--texto-dim); }
  .clima-principal{ display:flex; align-items:center; gap:14px; margin-top:6px; position:relative; z-index:1; }
  .clima-icono{ width:52px; height:52px; flex-shrink:0; }
  .clima-temp{ font-size:38px; font-weight:800; color:#fff; line-height:1; }
  .clima-desc{ font-size:12.5px; color:var(--texto-dim); margin-top:3px; }
  .clima-extra{ display:flex; gap:16px; margin-top:12px; position:relative; z-index:1; }
  .clima-dato{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--texto-dim); }
  .clima-dato svg{ width:14px; height:14px; color:var(--cian); flex-shrink:0; }
  .clima-dato b{ color:#fff; }

  .clima-horas{ display:flex; gap:6px; margin-top:14px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; position:relative; z-index:1; }
  .clima-horas::-webkit-scrollbar{ display:none; }
  .hora-item{ flex-shrink:0; width:52px; display:flex; flex-direction:column; align-items:center; gap:5px;
    background:rgba(255,255,255,.05); border-radius:12px; padding:8px 4px; }
  .hora-item.ahora{ background:rgba(23,242,255,.12); border:1px solid rgba(23,242,255,.3); }
  .hora-item .hora-txt{ font-size:10px; color:var(--texto-dim); font-weight:700; }
  .hora-item.ahora .hora-txt{ color:var(--cian); }
  .hora-item svg{ width:20px; height:20px; }
  .hora-item .hora-temp{ font-size:11.5px; font-weight:700; color:#fff; }
  .hora-item .hora-lluvia{ font-size:9px; color:var(--cian); }

  /* gotas de lluvia decorativas de fondo */
  .clima-lluvia-fondo{ position:absolute; inset:0; z-index:0; opacity:.25; pointer-events:none; overflow:hidden; }
  .gota-fondo{ position:absolute; top:-10%; width:1.5px; height:14px; background:linear-gradient(180deg, transparent, var(--cian));
    animation:caerGota linear infinite; }
  @keyframes caerGota{ from{ transform:translateY(0); } to{ transform:translateY(220px); } }
  @media (prefers-reduced-motion: reduce){ .gota-fondo{ animation:none; display:none; } }
</style>
</head>
<body>
<div id="app">
  <div class="fondo-aurora"></div>

  <div class="header">
    <div class="header-top">
      <h1>Noticias</h1>
      <div class="btn-icono" id="btnGuardadas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2Z"/></svg>
      </div>
    </div>
    <div class="buscador">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="buscarNoticia" placeholder="Buscar noticias..." />
    </div>
    <div class="filtros" id="filtros"></div>
  </div>

  <div class="lista-wrap">
    <div class="clima-card" id="climaCard" style="margin:6px 20px 12px;">
      <div class="clima-lluvia-fondo" id="climaLluviaFondo"></div>
      <div class="clima-top">
        <span class="clima-lugar" id="climaLugar">📍 Buenos Aires</span>
        <span class="clima-actualizado" id="climaActualizado">Actualizado ahora</span>
      </div>
      <div class="clima-principal">
        <svg class="clima-icono" id="climaIconoGrande" viewBox="0 0 24 24" fill="none"></svg>
        <div>
          <div class="clima-temp" id="climaTempActual">18°</div>
          <div class="clima-desc" id="climaDescActual">Parcialmente nublado</div>
        </div>
      </div>
      <div class="clima-extra">
        <div class="clima-dato">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"/><path d="M12 20v1M8 20v1M16 20v1"/></svg>
          <span>Lluvia: <b id="climaProbLluvia">30%</b></span>
        </div>
        <div class="clima-dato">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.6 4.6A2 2 0 1 1 11 8H2M12.6 19.4A2 2 0 1 0 14 16H2M17.6 7.6A2 2 0 1 1 19 11H2"/></svg>
          <span>Viento: <b id="climaViento">14 km/h</b></span>
        </div>
      </div>
      <div class="clima-horas" id="climaHoras"></div>
    </div>
    <div class="lista" id="lista"></div>
  </div>

  <div class="tabbar">
    <div class="tab" id="tabChats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5C3 7.4 6.8 4 11.5 4S20 7.4 20 11.5 16.2 19 11.5 19c-1 0-2-.2-2.9-.5L4 20l1.2-3.5C3.8 15 3 13.3 3 11.5Z"/></svg>
      <span>Chats</span>
    </div>
    <div class="tab" id="tabVideo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="7" width="12" height="10" rx="2"/><path d="M14.5 10.5 21 8v8l-6.5-2.5"/></svg>
      <span>Video</span>
    </div>
    <div class="tab activo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
      <span>Noticias</span>
    </div>
    <div class="tab" id="tabAjustes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9"/></svg>
      <span>Ajustes</span>
    </div>
  </div>
</div>

<script>
  const categorias = [
    { id:'todas', nombre:'Todas' },
    { id:'windows', nombre:'Windows' },
    { id:'movil', nombre:'Móvil' },
    { id:'hardware', nombre:'Hardware PC' },
    { id:'gaming', nombre:'Gaming' },
    { id:'ia', nombre:'IA' },
    { id:'ofertas', nombre:'Ofertas' }
  ];

  const noticias = [
    { id:1, titulo:'Nueva actualización de Windows 11 mejora el rendimiento en laptops', cat:'windows', fuente:'Xataka', hora:'Hace 1 h', destacada:true, img:'https://picsum.photos/id/180/600/400', nuevo:true },
    { id:2, titulo:'Precios de memorias RAM subieron 40% este mes en Argentina', cat:'hardware', fuente:'ByteFix', hora:'Hace 2 h', img:'https://picsum.photos/id/1/200/200', nuevo:true },
    { id:3, titulo:'Black Ops 7 Zombies: nuevo easter egg descubierto en el mapa Citadelle', cat:'gaming', fuente:'JuegosADN', hora:'Hace 3 h', img:'https://picsum.photos/id/2/200/200', nuevo:true },
    { id:4, titulo:'Cómo activar subtítulos automáticos en cualquier video de Android', cat:'movil', fuente:'Xataka Android', hora:'Hace 5 h', img:'https://picsum.photos/id/3/200/200' },
    { id:5, titulo:'Nueva IA argentina traduce lengua de señas en tiempo real', cat:'ia', fuente:'SeñasTech', hora:'Hace 6 h', img:'https://picsum.photos/id/4/200/200' },
    { id:6, titulo:'Oferta: SSD 1TB a mitad de precio esta semana en MercadoLibre', cat:'ofertas', fuente:'ByteFix', hora:'Hace 8 h', img:'https://picsum.photos/id/5/200/200' },
    { id:7, titulo:'Vandal repasa los mejores mods para mejorar gráficos en juegos viejos', cat:'gaming', fuente:'Vandal', hora:'Ayer', img:'https://picsum.photos/id/6/200/200' },
    { id:8, titulo:'Guía paso a paso: formatear tu PC sin perder archivos importantes', cat:'hardware', fuente:'ByteFix', hora:'Ayer', img:'https://picsum.photos/id/7/200/200' }
  ];

  let filtroActivo = 'todas';

  const filtrosCont = document.getElementById('filtros');
  categorias.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'filtro-chip' + (c.id === filtroActivo ? ' activo' : '');
    chip.dataset.id = c.id;
    chip.textContent = c.nombre;
    chip.addEventListener('click', () => {
      filtroActivo = c.id;
      document.querySelectorAll('.filtro-chip').forEach(el => el.classList.toggle('activo', el.dataset.id === c.id));
      render();
    });
    filtrosCont.appendChild(chip);
  });

  let guardadas = new Set();
  const lista = document.getElementById('lista');

  function render(busqueda){
    busqueda = busqueda || '';
    lista.innerHTML = '';
    let datos = noticias.filter(n => filtroActivo === 'todas' || n.cat === filtroActivo);
    if(busqueda.trim() !== ''){
      datos = datos.filter(n => n.titulo.toLowerCase().includes(busqueda.toLowerCase()));
    }

    if(datos.length === 0){
      lista.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--texto-dim);font-size:13.5px;">No hay noticias en esta categoría.</div>';
      return;
    }

    const destacada = datos.find(n => n.destacada);

    if(destacada){
      const card = document.createElement('div');
      card.className = 'noticia-destacada';
      const catNombre = (categorias.find(c => c.id === destacada.cat) || {}).nombre || '';
      card.innerHTML = `
        <img src="${destacada.img}" alt="">
        <div class="overlay"></div>
        <div class="contenido-dest">
          <span class="tag-cat">${catNombre}</span>
          <h2>${destacada.titulo}</h2>
          <div class="meta">${destacada.fuente} · ${destacada.hora}</div>
        </div>
      `;
      lista.appendChild(card);
    }

    datos.filter(n => !destacada || n.id !== destacada.id).forEach(n => {
      const card = document.createElement('div');
      card.className = 'noticia-card';
      const guardado = guardadas.has(n.id);
      card.innerHTML = `
        <div class="miniatura"><img src="${n.img}" alt=""></div>
        <div class="info">
          <h3>${n.titulo}</h3>
          <div class="meta">
            ${n.nuevo ? '<span class="punto-led nuevo"></span>' : ''}
            <span class="fuente">${n.fuente}</span> · ${n.hora}
          </div>
        </div>
        <div class="btn-guardar-noticia ${guardado ? 'guardado' : ''}" data-id="${n.id}">
          <svg viewBox="0 0 24 24" fill="${guardado ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2Z"/></svg>
        </div>
      `;
      lista.appendChild(card);
    });

    lista.querySelectorAll('.btn-guardar-noticia').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = +btn.dataset.id;
        if(guardadas.has(id)) guardadas.delete(id); else guardadas.add(id);
        btn.classList.toggle('guardado');
        btn.querySelector('svg').setAttribute('fill', guardadas.has(id) ? 'currentColor' : 'none');
      });
    });

    lista.querySelectorAll('.noticia-card, .noticia-destacada').forEach(card => {
      card.addEventListener('click', (e) => {
        if(e.target.closest('.btn-guardar-noticia')) return;
        console.log('abrir noticia completa');
      });
    });
  }

  render();

  document.getElementById('buscarNoticia').addEventListener('input', (e) => render(e.target.value));
  document.getElementById('btnGuardadas').addEventListener('click', () => console.log('ver noticias guardadas'));
  document.getElementById('tabChats').addEventListener('click', () => { window.location.href = 'chats-lista.html'; });
  document.getElementById('tabVideo').addEventListener('click', () => console.log('ir a videollamadas (aún no conectado)'));
  document.getElementById('tabAjustes').addEventListener('click', () => { window.location.href = 'ajustes.html'; });

  // ===== clima (datos de ejemplo — se conecta a una API real cuando esté el backend) =====
  const iconos = {
    sol: `<circle cx="12" cy="12" r="5" fill="#f6b40e"/><g stroke="#f6b40e" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></g>`,
    parcial: `<circle cx="9" cy="10" r="4" fill="#f6b40e"/><path d="M6 18a4.5 4.5 0 0 1 .5-9 6 6 0 0 1 11.4 2A4 4 0 0 1 17 18H6Z" fill="#c9b8e8" opacity=".9"/>`,
    nublado: `<path d="M6 18a4.5 4.5 0 0 1 .5-9 6 6 0 0 1 11.4 2A4 4 0 0 1 17 18H6Z" fill="#9d89c4"/>`,
    lluvia: `<path d="M6 14a4.5 4.5 0 0 1 .5-9 6 6 0 0 1 11.4 2A4 4 0 0 1 17 14H6Z" fill="#8a7ab0"/><g stroke="#17f2ff" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="17" x2="7" y2="21"/><line x1="12" y1="17" x2="11" y2="21"/><line x1="16" y1="17" x2="15" y2="21"/></g>`
  };

  const datosClima = {
    lugar: '📍 Buenos Aires',
    tempActual: 18,
    descActual: 'Parcialmente nublado',
    condActual: 'parcial',
    probLluvia: 30,
    viento: 14,
    horas: [
      { hora:'Ahora', temp:18, cond:'parcial', lluvia:10, ahora:true },
      { hora:'15:00', temp:19, cond:'sol', lluvia:5 },
      { hora:'16:00', temp:20, cond:'sol', lluvia:5 },
      { hora:'17:00', temp:18, cond:'nublado', lluvia:35 },
      { hora:'18:00', temp:16, cond:'lluvia', lluvia:70 },
      { hora:'19:00', temp:15, cond:'lluvia', lluvia:65 },
      { hora:'20:00', temp:14, cond:'nublado', lluvia:20 }
    ]
  };

  document.getElementById('climaLugar').textContent = datosClima.lugar;
  document.getElementById('climaTempActual').textContent = datosClima.tempActual + '°';
  document.getElementById('climaDescActual').textContent = datosClima.descActual;
  document.getElementById('climaProbLluvia').textContent = datosClima.probLluvia + '%';
  document.getElementById('climaViento').textContent = datosClima.viento + ' km/h';
  document.getElementById('climaIconoGrande').innerHTML = iconos[datosClima.condActual];

  function horaActualTexto(){
    const ahora = new Date();
    return 'Actualizado ' + ahora.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  }
  document.getElementById('climaActualizado').textContent = horaActualTexto();

  const climaHoras = document.getElementById('climaHoras');
  datosClima.horas.forEach(h => {
    const item = document.createElement('div');
    item.className = 'hora-item' + (h.ahora ? ' ahora' : '');
    item.innerHTML = `
      <span class="hora-txt">${h.hora}</span>
      <svg viewBox="0 0 24 24" fill="none">${iconos[h.cond]}</svg>
      <span class="hora-temp">${h.temp}°</span>
      <span class="hora-lluvia">💧${h.lluvia}%</span>
    `;
    climaHoras.appendChild(item);
  });

  // si la probabilidad de lluvia actual es alta, mostramos gotas cayendo de fondo en la tarjeta
  if(datosClima.probLluvia >= 50 || datosClima.condActual === 'lluvia'){
    const fondo = document.getElementById('climaLluviaFondo');
    for(let i = 0; i < 14; i++){
      const gota = document.createElement('div');
      gota.className = 'gota-fondo';
      gota.style.left = (Math.random()*100) + '%';
      gota.style.animationDuration = (0.8 + Math.random()*0.8) + 's';
      gota.style.animationDelay = (Math.random()*1.5) + 's';
      fondo.appendChild(gota);
    }
  }
</script>
</body>
</html>
