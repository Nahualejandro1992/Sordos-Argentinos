<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sordos Argentinos — Login/Registro (conectado)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#eafcff; --ink-muted:#9d8bd6;
    --pink:#ff00ff; --cyan:#00ffff; --lime:#c6ff3d; --danger:#ff3b3b;
  }
  *{ box-sizing:border-box; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
  html,body{ overscroll-behavior:none; }
  html,body{ height:100%; }
  body{
    margin:0; font-family:'Inter', sans-serif; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    padding:24px 14px;
    background: linear-gradient(150deg, #1a0033, #330066);
  }

  .stage{ width:100%; max-width:400px; display:flex; flex-direction:column; gap:16px; }

  .brand{ text-align:center; margin-bottom:6px; }
  .brand-mark{
    position:relative;
    width:100%; margin:0 auto 14px;
    display:flex; align-items:center; justify-content:center;
    padding:14px 8px;
  }
  .brand-mark::before{
    content:''; position:absolute; inset:-20px;
    background: radial-gradient(ellipse at center, rgba(255,0,255,0.18), rgba(0,255,255,0.1) 45%, transparent 70%);
    z-index:-2; filter: blur(4px);
  }
  .glitch-text{
    position:relative;
    font-family:'Space Grotesk', sans-serif; font-weight:800; font-size:30px;
    color:#fff; text-align:center; line-height:1.1;
    text-shadow: 0 0 10px rgba(255,255,255,0.6), 0 0 22px rgba(255,0,255,0.5), 0 0 34px rgba(0,255,255,0.35);
  }
  .glitch-text::before, .glitch-text::after{
    content: 'Sordos Argentinos';
    white-space:nowrap;
    position:absolute; top:0; left:0; width:100%;
    overflow:hidden;
  }
  .glitch-text::before{
    color: var(--pink);
    text-shadow: 0 0 16px var(--pink), 0 0 28px rgba(255,0,255,0.6);
    animation: k-glitch1 0.35s infinite steps(1);
    z-index:-1;
  }
  .glitch-text::after{
    color: var(--cyan);
    text-shadow: 0 0 16px var(--cyan), 0 0 28px rgba(0,255,255,0.6);
    animation: k-glitch2 0.42s infinite steps(1);
    z-index:-1;
  }
  @keyframes k-glitch1{
    0%{ clip-path: inset(0 0 85% 0); transform: translate(-6px,-3px); }
    16%{ clip-path: inset(35% 0 40% 0); transform: translate(7px,2px); }
    32%{ clip-path: inset(70% 0 5% 0); transform: translate(-5px,3px); }
    48%{ clip-path: inset(5% 0 75% 0); transform: translate(6px,-2px); }
    64%{ clip-path: inset(50% 0 15% 0); transform: translate(0,0); }
    80%{ clip-path: inset(20% 0 55% 0); transform: translate(-7px,2px); }
    100%{ clip-path: inset(60% 0 25% 0); transform: translate(4px,-3px); }
  }
  @keyframes k-glitch2{
    0%{ clip-path: inset(60% 0 10% 0); transform: translate(6px,2px); }
    18%{ clip-path: inset(15% 0 60% 0); transform: translate(-7px,-2px); }
    36%{ clip-path: inset(80% 0 5% 0); transform: translate(4px,3px); }
    54%{ clip-path: inset(25% 0 50% 0); transform: translate(-5px,0); }
    72%{ clip-path: inset(5% 0 82% 0); transform: translate(7px,-3px); }
    100%{ clip-path: inset(45% 0 30% 0); transform: translate(-4px,2px); }
  }
  .brand-sub{ font-size:12.5px; color: var(--ink-muted); margin-top:8px; }

  .tabs{ display:flex; gap:8px; background:#000; border-radius:14px; padding:4px; border:1px solid rgba(255,255,255,0.12); }
  .tab-btn{ flex:1; padding:10px; border-radius:11px; border:none; background:none; color:var(--ink-muted); font-weight:600; font-size:13px; cursor:pointer; }
  .tab-btn.active{ background: linear-gradient(135deg, rgba(255,0,255,0.2), rgba(0,255,255,0.15)); color:#fff; box-shadow: inset 0 0 0 1px var(--pink); }

  .card{
    position:relative;
    background: linear-gradient(150deg, #1a0033, #2b0052);
    border: 1px solid rgba(255,0,255,0.3);
    border-radius:22px; padding:24px;
    box-shadow: 0 0 30px rgba(255,0,255,0.12);
    display:flex; flex-direction:column; gap:16px;
    overflow:hidden;
  }
  .card::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background: repeating-linear-gradient(90deg, transparent 0 4px, rgba(255,0,255,0.04) 4px 5px);
  }

  .field-label{ font-size:12px; color: var(--ink-muted); margin-bottom:6px; display:block; position:relative; z-index:2; }
  .field input{
    width:100%; background:#000; border:1px solid rgba(0,255,255,0.35);
    border-radius:12px; padding:13px 16px; color:var(--ink); font-size:16px; outline:none; position:relative; z-index:2;
  }
  .field input:focus{ border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,255,255,0.4); }

  .btn-primary{
    position:relative; z-index:2;
    padding:15px; border-radius:14px; border: 1.5px solid var(--pink); cursor:pointer;
    background:#000; color: var(--pink); font-weight:700; font-size:14.5px;
    box-shadow: 0 0 16px rgba(255,0,255,0.35);
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; }
  .spinner{ width:14px; height:14px; border:2px solid rgba(255,0,255,0.3); border-top-color:var(--pink); border-radius:50%; animation:spin .6s linear infinite; display:none; }
  .spinner.show{ display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .msg{ position:relative; z-index:2; font-size:12px; text-align:center; padding:10px 12px; border-radius:12px; display:none; line-height:1.5; }
  .msg.show{ display:block; }
  .msg.ok{ background: rgba(198,255,61,0.08); border:1px solid rgba(198,255,61,0.3); color:var(--lime); }
  .msg.err{ background: rgba(255,59,59,0.08); border:1px solid rgba(255,59,59,0.3); color:var(--danger); }

  .free-note{
    display:flex; align-items:center; gap:8px; position:relative; z-index:2;
    background: rgba(198,255,61,0.06); border:1px solid rgba(198,255,61,0.3); border-radius:14px;
    padding:11px 14px; font-size:11px; color: var(--ink-muted); line-height:1.5;
  }
  .free-note svg{ width:16px; height:16px; flex-shrink:0; color:#c6ff3d; }

  .conn-status{
    display:flex; align-items:center; justify-content:center; gap:6px;
    font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--ink-muted);
  }
  .conn-dot{ width:6px; height:6px; border-radius:50%; background:var(--lime); box-shadow:0 0 6px var(--lime); }
  .conn-dot.off{ background:var(--danger); box-shadow:0 0 6px var(--danger); }

  /* ===== Efecto de fondo: señal fallando en toda la app ===== */
  .bg-noise{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.09;
    background-image: repeating-linear-gradient(0deg, #fff 0 1px, transparent 1px 3px);
    animation: k-noise-shift .15s steps(2) infinite;
  }
  @keyframes k-noise-shift{ to{ background-position: 0 6px; } }

  .bg-scanline{
    position:fixed; left:0; right:0; height:4px; z-index:0; pointer-events:none;
    background: rgba(0,255,255,0.12); mix-blend-mode: screen;
    animation: k-scan 2.8s linear infinite;
  }
  @keyframes k-scan{ 0%{ top:-3px; } 100%{ top:100%; } }

  .bg-signal-drop{
    position:fixed; inset:0; z-index:1; pointer-events:none; background:#000; opacity:0;
    animation: k-bg-drop 3.2s infinite;
  }
  @keyframes k-bg-drop{
    0%,88%{ opacity:0; }
    89%{ opacity:.7; }
    89.5%{ opacity:0; }
    90%{ opacity:.85; }
    90.4%{ opacity:0; }
    91%{ opacity:.5; }
    91.3%{ opacity:0; }
    100%{ opacity:0; }
  }

  .bg-slice{
    position:fixed; left:0; right:0; height:6px; z-index:1; pointer-events:none;
    mix-blend-mode: screen; opacity:0;
    animation: k-bg-slice 3s infinite;
  }
  .bg-slice.s1{ top:18%; background: rgba(255,0,255,0.5); animation-delay:0s; }
  .bg-slice.s2{ top:48%; background: rgba(0,255,255,0.5); animation-delay:.2s; }
  .bg-slice.s3{ top:74%; background: rgba(255,255,255,0.6); animation-delay:.4s; }
  .bg-slice.s4{ top:35%; background: rgba(198,255,61,0.4); animation-delay:.55s; }
  @keyframes k-bg-slice{
    0%,90%{ opacity:0; transform: translateX(0); }
    90.5%{ opacity:1; transform: translateX(-30px); }
    91.5%{ opacity:1; transform: translateX(26px); }
    92.5%{ opacity:1; transform: translateX(-14px); }
    94%{ opacity:0; transform: translateX(0); }
    100%{ opacity:0; }
  }

  .stage{ position:relative; z-index:2; }
</style>
</head>
<body>

<div class="bg-noise"></div>
<div class="bg-scanline"></div>
<div class="bg-signal-drop"></div>
<div class="bg-slice s1"></div>
<div class="bg-slice s2"></div>
<div class="bg-slice s3"></div>
<div class="bg-slice s4"></div>

<div class="stage">

  <div class="brand">
    <div class="brand-mark"><div class="glitch-text">Sordos Argentinos</div></div>
    <div class="brand-sub">Chat y videollamadas para la comunidad de sordos de Buenos Aires</div>
  </div>

  <div class="conn-status"><span class="conn-dot" id="connDot"></span><span id="connText">Conectando con Supabase...</span></div>

  <div class="tabs">
    <button class="tab-btn active" id="tabLogin" onclick="setMode('login')">Iniciar sesión</button>
    <button class="tab-btn" id="tabSignup" onclick="setMode('signup')">Crear cuenta</button>
  </div>

  <div class="card">
    <div class="field">
      <span class="field-label">Tu apodo</span>
      <input type="text" id="emailInput" placeholder="Ej: turro86" autocapitalize="none">
    </div>
    <div class="field">
      <span class="field-label">Contraseña</span>
      <input type="password" id="passInput" placeholder="Mínimo 8 caracteres">
    </div>

    <div class="msg" id="msgBox"></div>

    <button class="btn-primary" id="submitBtn" onclick="submitForm()">
      <span class="spinner" id="spinner"></span>
      <span id="submitLabel">Iniciar sesión</span>
    </button>
  </div>

  <div class="free-note">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 8v5l3 3M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.6"/></svg>
    Sin email, sin SMS — solo tu apodo y contraseña. 100% gratis.
  </div>

</div>

<script>
  // ===== CONEXIÓN REAL A SUPABASE =====
  const SUPABASE_URL = 'https://slidcibxmsfhssbdihou.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsaWRjaWJ4bXNmaHNzYmRpaG91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzIyMDksImV4cCI6MjA5OTU0ODIwOX0.n0Glud1XevxP1BChN7r4lc49lqDa9WJxH6RI32HhLnI';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let mode = 'login';

  function setMode(m){
    mode = m;
    document.getElementById('tabLogin').classList.toggle('active', m === 'login');
    document.getElementById('tabSignup').classList.toggle('active', m === 'signup');
    document.getElementById('submitLabel').textContent = m === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
    hideMsg();
  }

  function showMsg(text, type){
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg show ' + type;
  }
  function hideMsg(){
    document.getElementById('msgBox').className = 'msg';
  }

  function setLoading(loading){
    document.getElementById('submitBtn').disabled = loading;
    document.getElementById('spinner').classList.toggle('show', loading);
  }

  async function submitForm(){
    const nickname = document.getElementById('emailInput').value.trim().toLowerCase().replace(/[^a-z0-9_.]/g, '');
    const password = document.getElementById('passInput').value;

    if (!nickname || !password){
      showMsg('Completá tu apodo y contraseña', 'err');
      return;
    }
    if (nickname.length < 3){
      showMsg('El apodo tiene que tener al menos 3 letras', 'err');
      return;
    }

    const email = nickname + '@sordosargentinos.app';

    hideMsg();
    setLoading(true);

    if (mode === 'signup'){
      const { data, error } = await sb.auth.signUp({ email, password });
      setLoading(false);

      if (error){
        if (error.message.includes('already registered')){
          showMsg('Ese apodo ya está en uso, probá otro', 'err');
        } else {
          showMsg('Error: ' + error.message, 'err');
        }
        return;
      }

      if (data.user){
        await sb.from('profiles').insert({
          id: data.user.id,
          phone: '',
          name: nickname,
          status: 'pending'
        });
      }

      showMsg('¡Cuenta creada! Entrando...', 'ok');
      setTimeout(() => { window.location.href = 'app.html'; }, 1200);
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      setLoading(false);

      if (error){
        showMsg('Apodo o contraseña incorrectos', 'err');
        return;
      }

      showMsg('¡Sesión iniciada! Entrando...', 'ok');
      console.log('Usuario logueado:', data.user);
      setTimeout(() => { window.location.href = 'app.html'; }, 900);
    }
  }

  async function checkConnection(){
    const dot = document.getElementById('connDot');
    const text = document.getElementById('connText');
    try {
      const { error } = await sb.from('profiles').select('id').limit(1);
      if (error) throw error;
      dot.classList.remove('off');
      text.textContent = 'Conectado a Supabase — proyecto Sordos Argentinos';
    } catch(e){
      dot.classList.add('off');
      text.textContent = 'No se pudo conectar: ' + e.message;
    }
  }
  checkConnection();
</script>

</body>
</html>
