<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sordos Argentinos — Login/Registro (conectado)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#eafcff; --ink-muted:#9d8bd6;
    --pink:#ff00ff; --cyan:#00ffff; --lime:#c6ff3d; --danger:#ff3b3b;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; font-family:'Inter', sans-serif; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    padding:24px 14px;
    background: linear-gradient(150deg, #1a0033, #330066);
  }

  .stage{ width:100%; max-width:400px; display:flex; flex-direction:column; gap:16px; }

  .brand{ text-align:center; margin-bottom:6px; }
  .brand-mark{
    width:100%; max-width:340px; height:76px; margin:0 auto 14px; border-radius:20px;
    background:#000; border:2px solid var(--pink);
    display:flex; align-items:center; justify-content:center; padding:8px 12px;
    animation: k-comboB 0.4s steps(1) infinite;
  }
  @keyframes k-comboB{
    0%{ border-color: var(--pink); box-shadow: 0 0 24px var(--pink); }
    12%{ border-color: #fff; box-shadow: 0 0 34px #fff; }
    24%{ border-color: var(--pink); box-shadow: 0 0 24px var(--pink); }
    50%{ border-color: var(--cyan); box-shadow: 0 0 24px var(--cyan); }
    62%{ border-color: #fff; box-shadow: 0 0 34px #fff; }
    74%{ border-color: var(--cyan); box-shadow: 0 0 24px var(--cyan); }
    100%{ border-color: var(--pink); box-shadow: 0 0 24px var(--pink); }
  }
  .brand-mark span{
    font-family:'Space Grotesk', sans-serif; font-weight:800; font-size:20px; text-align:center; line-height:1.2; white-space:nowrap;
    background: linear-gradient(135deg,var(--pink),var(--cyan)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .brand-sub{ font-size:12.5px; color: var(--ink-muted); margin-top:8px; }

  .tabs{ display:flex; gap:8px; background:#000; border-radius:14px; padding:4px; border:1px solid rgba(255,255,255,0.12); }
  .tab-btn{ flex:1; padding:10px; border-radius:11px; border:none; background:none; color:var(--ink-muted); font-weight:600; font-size:13px; cursor:pointer; }
  .tab-btn.active{ background: linear-gradient(135deg, rgba(255,0,255,0.2), rgba(0,255,255,0.15)); color:#fff; box-shadow: inset 0 0 0 1px var(--pink); }

  .card{
    position:relative;
    background: linear-gradient(150deg, #1a0033, #2b0052);
    border: 1px solid rgba(255,0,255,0.3);
    border-radius:22px; padding:24px;
    box-shadow: 0 0 30px rgba(255,0,255,0.12);
    display:flex; flex-direction:column; gap:16px;
    overflow:hidden;
  }
  .card::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background: repeating-linear-gradient(90deg, transparent 0 4px, rgba(255,0,255,0.04) 4px 5px);
  }

  .field-label{ font-size:12px; color: var(--ink-muted); margin-bottom:6px; display:block; position:relative; z-index:2; }
  .field input{
    width:100%; background:#000; border:1px solid rgba(0,255,255,0.35);
    border-radius:12px; padding:13px 16px; color:var(--ink); font-size:14.5px; outline:none; position:relative; z-index:2;
  }
  .field input:focus{ border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,255,255,0.4); }

  .btn-primary{
    position:relative; z-index:2;
    padding:15px; border-radius:14px; border: 1.5px solid var(--pink); cursor:pointer;
    background:#000; color: var(--pink); font-weight:700; font-size:14.5px;
    box-shadow: 0 0 16px rgba(255,0,255,0.35);
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; }
  .spinner{ width:14px; height:14px; border:2px solid rgba(255,0,255,0.3); border-top-color:var(--pink); border-radius:50%; animation:spin .6s linear infinite; display:none; }
  .spinner.show{ display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .msg{ position:relative; z-index:2; font-size:12px; text-align:center; padding:10px 12px; border-radius:12px; display:none; line-height:1.5; }
  .msg.show{ display:block; }
  .msg.ok{ background: rgba(198,255,61,0.08); border:1px solid rgba(198,255,61,0.3); color:var(--lime); }
  .msg.err{ background: rgba(255,59,59,0.08); border:1px solid rgba(255,59,59,0.3); color:var(--danger); }

  .free-note{
    display:flex; align-items:center; gap:8px; position:relative; z-index:2;
    background: rgba(198,255,61,0.06); border:1px solid rgba(198,255,61,0.3); border-radius:14px;
    padding:11px 14px; font-size:11px; color: var(--ink-muted); line-height:1.5;
  }
  .free-note svg{ width:16px; height:16px; flex-shrink:0; color:#c6ff3d; }

  .conn-status{
    display:flex; align-items:center; justify-content:center; gap:6px;
    font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--ink-muted);
  }
  .conn-dot{ width:6px; height:6px; border-radius:50%; background:var(--lime); box-shadow:0 0 6px var(--lime); }
  .conn-dot.off{ background:var(--danger); box-shadow:0 0 6px var(--danger); }
</style>
</head>
<body>

<div class="stage">

  <div class="brand">
    <div class="brand-mark"><span>Sordos Argentinos</span></div>
    <div class="brand-sub">Chat y videollamadas para la comunidad de sordos de Buenos Aires</div>
  </div>

  <div class="conn-status"><span class="conn-dot" id="connDot"></span><span id="connText">Conectando con Supabase...</span></div>

  <div class="tabs">
    <button class="tab-btn active" id="tabLogin" onclick="setMode('login')">Iniciar sesión</button>
    <button class="tab-btn" id="tabSignup" onclick="setMode('signup')">Crear cuenta</button>
  </div>

  <div class="card">
    <div class="field">
      <span class="field-label">Tu apodo</span>
      <input type="text" id="emailInput" placeholder="Ej: turro86" autocapitalize="none">
    </div>
    <div class="field">
      <span class="field-label">Contraseña</span>
      <input type="password" id="passInput" placeholder="Mínimo 8 caracteres">
    </div>

    <div class="msg" id="msgBox"></div>

    <button class="btn-primary" id="submitBtn" onclick="submitForm()">
      <span class="spinner" id="spinner"></span>
      <span id="submitLabel">Iniciar sesión</span>
    </button>
  </div>

  <div class="free-note">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 8v5l3 3M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.6"/></svg>
    Sin email, sin SMS — solo tu apodo y contraseña. 100% gratis.
  </div>

</div>

<script>
  // ===== CONEXIÓN REAL A SUPABASE =====
  const SUPABASE_URL = 'https://slidcibxmsfhssbdihou.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsaWRjaWJ4bXNmaHNzYmRpaG91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzIyMDksImV4cCI6MjA5OTU0ODIwOX0.n0Glud1XevxP1BChN7r4lc49lqDa9WJxH6RI32HhLnI';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let mode = 'login';

  function setMode(m){
    mode = m;
    document.getElementById('tabLogin').classList.toggle('active', m === 'login');
    document.getElementById('tabSignup').classList.toggle('active', m === 'signup');
    document.getElementById('submitLabel').textContent = m === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
    hideMsg();
  }

  function showMsg(text, type){
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg show ' + type;
  }
  function hideMsg(){
    document.getElementById('msgBox').className = 'msg';
  }

  function setLoading(loading){
    document.getElementById('submitBtn').disabled = loading;
    document.getElementById('spinner').classList.toggle('show', loading);
  }

  async function submitForm(){
    const nickname = document.getElementById('emailInput').value.trim().toLowerCase().replace(/[^a-z0-9_.]/g, '');
    const password = document.getElementById('passInput').value;

    if (!nickname || !password){
      showMsg('Completá tu apodo y contraseña', 'err');
      return;
    }
    if (nickname.length < 3){
      showMsg('El apodo tiene que tener al menos 3 letras', 'err');
      return;
    }

    const email = nickname + '@sordosargentinos.app';

    hideMsg();
    setLoading(true);

    if (mode === 'signup'){
      const { data, error } = await sb.auth.signUp({ email, password });
      setLoading(false);

      if (error){
        if (error.message.includes('already registered')){
          showMsg('Ese apodo ya está en uso, probá otro', 'err');
        } else {
          showMsg('Error: ' + error.message, 'err');
        }
        return;
      }

      if (data.user){
        await sb.from('profiles').insert({
          id: data.user.id,
          phone: '',
          name: nickname,
          status: 'pending'
        });
      }

      showMsg('¡Cuenta creada! Ya podés iniciar sesión.', 'ok');
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      setLoading(false);

      if (error){
        showMsg('Apodo o contraseña incorrectos', 'err');
        return;
      }

      showMsg('¡Sesión iniciada! Bienvenido/a de nuevo.', 'ok');
      console.log('Usuario logueado:', data.user);
    }
  }

  async function checkConnection(){
    const dot = document.getElementById('connDot');
    const text = document.getElementById('connText');
    try {
      const { error } = await sb.from('profiles').select('id').limit(1);
      if (error) throw error;
      dot.classList.remove('off');
      text.textContent = 'Conectado a Supabase — proyecto Sordos Argentinos';
    } catch(e){
      dot.classList.add('off');
      text.textContent = 'No se pudo conectar: ' + e.message;
    }
  }
  checkConnection();
</script>

</body>
</html>
