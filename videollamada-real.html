<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Sordos Argentinos — Videollamada</title>
<style>
  :root{ --violeta-bg:#050014; --magenta:#ff2ec4; --cian:#17f2ff; --texto:#f4e9ff; --texto-dim:#b79ad1; --rojo:#ff3b30; --verde:#5bffa0; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #app{ position:fixed; inset:0; width:100vw; height:100dvh; background:#000; display:flex; flex-direction:column; }

  #bannerDiagnostico{ display:none; position:fixed; top:0; left:0; right:0; z-index:999; background:#ff2d3f; color:#fff;
    padding:calc(10px + env(safe-area-inset-top)) 16px 10px; font-size:12.5px; text-align:center; line-height:1.5; }

  .video-remoto{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#0a0014; }
  .video-local{ position:absolute; top:calc(16px + env(safe-area-inset-top)); right:16px; width:110px; height:150px;
    border-radius:16px; object-fit:cover; background:#150022; border:2px solid rgba(255,255,255,.15); z-index:5;
    transform:scaleX(-1); }

  .estado-central{ position:relative; z-index:2; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
  .avatar-central{ width:110px; height:110px; border-radius:50%; background:linear-gradient(135deg,#7209b7,#4361ee,var(--cian));
    display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:800; color:#fff;
    box-shadow:0 0 40px rgba(255,46,196,.3); animation:pulsoAv 1.8s ease-in-out infinite; }
  @keyframes pulsoAv{ 0%,100%{ box-shadow:0 0 40px rgba(255,46,196,.3); } 50%{ box-shadow:0 0 55px rgba(255,46,196,.5); } }
  .nombre-central{ font-size:21px; font-weight:800; color:#fff; position:relative; z-index:2; }
  .estado-txt-central{ font-size:13.5px; color:var(--texto-dim); position:relative; z-index:2; }
  @media (prefers-reduced-motion: reduce){ .avatar-central{ animation:none; } }

  .barra-controles{ position:relative; z-index:2; display:flex; align-items:center; justify-content:center; gap:16px;
    padding:16px 20px calc(20px + env(safe-area-inset-bottom)); }
  .btn-control{ width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; }
  .btn-control svg{ width:23px; height:23px; color:#fff; }
  .btn-control.activo{ background:#fff; }
  .btn-control.activo svg{ color:#0a0014; }
  .btn-control.colgar{ background:var(--rojo); width:62px; }
  .btn-control:active{ transform:scale(.92); }

  .llamada-entrante{ position:fixed; inset:0; z-index:30; background:linear-gradient(180deg,#1a0630,#050014);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; opacity:0; pointer-events:none; transition:opacity .2s ease; }
  .llamada-entrante.activo{ opacity:1; pointer-events:auto; }
  .botones-entrante{ display:flex; gap:60px; margin-top:50px; }
  .btn-aceptar-in{ width:64px; height:64px; border-radius:50%; background:var(--verde); display:flex; align-items:center; justify-content:center; animation:pulsoAceptarIn 1.2s ease-in-out infinite; }
  @keyframes pulsoAceptarIn{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }
  .btn-aceptar-in svg{ width:26px; height:26px; color:#050014; }
  .btn-rechazar-in{ width:64px; height:64px; border-radius:50%; background:var(--rojo); display:flex; align-items:center; justify-content:center; }
  .btn-rechazar-in svg{ width:26px; height:26px; color:#fff; }
</style>
</head>
<body>
<div id="app">
  <div id="bannerDiagnostico"></div>

  <video id="videoRemoto" class="video-remoto" autoplay playsinline></video>
  <video id="videoLocal" class="video-local" autoplay playsinline muted></video>

  <div class="estado-central" id="estadoCentral">
    <div class="avatar-central" id="avatarCentral">?</div>
    <div class="nombre-central" id="nombreCentral">Conectando...</div>
    <div class="estado-txt-central" id="estadoTxtCentral">Preparando la llamada...</div>
  </div>

  <div class="barra-controles">
    <div class="btn-control" id="btnMic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v4M9 22h6"/></svg></div>
    <div class="btn-control activo" id="btnCam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="7" width="12" height="10" rx="2"/><path d="M14.5 10.5 21 8v8l-6.5-2.5"/></svg></div>
    <div class="btn-control colgar" id="btnColgar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 5 14 14M19 5 5 19"/></svg></div>
  </div>

  <div class="llamada-entrante" id="llamadaEntrante">
    <div class="avatar-central" id="avatarEntrante">?</div>
    <div class="nombre-central" id="nombreEntrante">Alguien</div>
    <div class="estado-txt-central">Videollamada entrante...</div>
    <div class="botones-entrante">
      <div class="btn-rechazar-in" id="btnRechazarEntrante"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 5 14 14M19 5 5 19"/></svg></div>
      <div class="btn-aceptar-in" id="btnAceptarEntrante"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="7" width="12" height="10" rx="2"/><path d="M14.5 10.5 21 8v8l-6.5-2.5"/></svg></div>
    </div>
  </div>
</div>

<script>
  function cargarScriptConFallback(urls, callback){
    let i = 0;
    function intentar(){
      if(i >= urls.length){ callback(false); return; }
      const s = document.createElement('script');
      s.src = urls[i];
      s.onload = () => callback(true);
      s.onerror = () => { i++; intentar(); };
      document.head.appendChild(s);
    }
    intentar();
  }
  function avisar(texto){
    const b = document.getElementById('bannerDiagnostico');
    b.style.display = 'block';
    b.textContent = texto;
  }

  const params = new URLSearchParams(window.location.search);
  const otroId = params.get('with');
  const otroNombre = params.get('name') || 'Alguien';
  const rol = params.get('role') || 'caller'; // 'caller' o 'callee'

  document.getElementById('nombreCentral').textContent = otroNombre;
  document.getElementById('avatarCentral').textContent = otroNombre[0].toUpperCase();
  document.getElementById('nombreEntrante').textContent = otroNombre;
  document.getElementById('avatarEntrante').textContent = otroNombre[0].toUpperCase();

  const CONFIG_ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  let sb, miId, pc, streamLocal, canal;
  let colgado = false;

  const videoLocal = document.getElementById('videoLocal');
  const videoRemoto = document.getElementById('videoRemoto');
  const estadoTxtCentral = document.getElementById('estadoTxtCentral');
  const llamadaEntrante = document.getElementById('llamadaEntrante');

  cargarScriptConFallback([
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
    'https://unpkg.com/@supabase/supabase-js@2'
  ], async (exito) => {
    if(!exito || typeof supabase === 'undefined'){
      avisar('⚠️ No se pudo cargar la conexión a Supabase.');
      return;
    }
    sb = supabase.createClient(
      'https://slidcibxmsfhssbdihou.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsaWRjaWJ4bXNmaHNzYmRpaG91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzIyMDksImV4cCI6MjA5OTU0ODIwOX0.n0Glud1XevxP1BChN7r4lc49lqDa9WJxH6RI32HhLnI'
    );
    const { data: sesionData } = await sb.auth.getSession();
    if(!sesionData.session){
      avisar('⚠️ Necesitás iniciar sesión primero.');
      setTimeout(() => window.location.href = 'login.html', 1500);
      return;
    }
    miId = sesionData.session.user.id;

    if(!otroId){
      avisar('⚠️ Falta con quién llamar (?with= en la URL).');
      return;
    }

    try{
      streamLocal = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      videoLocal.srcObject = streamLocal;
    } catch(err){
      avisar('⚠️ Necesitás dar permiso de cámara y micrófono para llamar.');
      return;
    }

    const canalRing = sb.channel('ring-' + otroId, { config: { broadcast: { self: false } } });
    if(rol === 'caller'){
      const { data: miPerfil } = await sb.from('profiles').select('name').eq('id', miId).single();
      canalRing.subscribe((status) => {
        if(status === 'SUBSCRIBED'){
          canalRing.send({ type: 'broadcast', event: 'ring', payload: { callerId: miId, callerName: miPerfil?.name || 'Alguien' } });
        }
      });
    }

    const nombreCanal = 'call-' + [miId, otroId].sort().join('-');
    canal = sb.channel(nombreCanal, { config: { broadcast: { self: false } } });

    pc = new RTCPeerConnection(CONFIG_ICE);
    streamLocal.getTracks().forEach(track => pc.addTrack(track, streamLocal));

    pc.ontrack = (e) => {
      videoRemoto.srcObject = e.streams[0];
      estadoTxtCentral.textContent = '';
      document.getElementById('estadoCentral').style.display = 'none';
    };

    pc.onicecandidate = (e) => {
      if(e.candidate){
        canal.send({ type: 'broadcast', event: 'ice-candidate', payload: { candidate: e.candidate, de: rol } });
      }
    };

    pc.onconnectionstatechange = () => {
      if(pc.connectionState === 'connected'){
        estadoTxtCentral.textContent = 'Conectado';
      } else if(['disconnected','failed','closed'].includes(pc.connectionState)){
        if(!colgado) finalizarLlamada();
      }
    };

    canal
      .on('broadcast', { event: 'offer' }, async ({ payload }) => {
        if(rol !== 'callee') return;
        await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        canal.send({ type: 'broadcast', event: 'answer', payload: { sdp: answer } });
      })
      .on('broadcast', { event: 'answer' }, async ({ payload }) => {
        if(rol !== 'caller') return;
        await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      })
      .on('broadcast', { event: 'ice-candidate' }, async ({ payload }) => {
        if(payload.de === rol) return;
        try{ await pc.addIceCandidate(payload.candidate); } catch(err){}
      })
      .on('broadcast', { event: 'colgar' }, () => {
        finalizarLlamada(true);
      })
      .subscribe(async (status) => {
        if(status !== 'SUBSCRIBED') return;
        if(rol === 'caller'){
          estadoTxtCentral.textContent = 'Llamando...';
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          canal.send({ type: 'broadcast', event: 'offer', payload: { sdp: offer } });
        } else {
          estadoTxtCentral.textContent = 'Conectando...';
        }
      });
  });

  function finalizarLlamada(remoto){
    colgado = true;
    if(pc) pc.close();
    if(streamLocal) streamLocal.getTracks().forEach(t => t.stop());
    if(canal && !remoto) sb.removeChannel(canal);
    estadoTxtCentral.textContent = remoto ? 'La otra persona colgó' : 'Llamada finalizada';
    setTimeout(() => { window.location.href = `chat-individual.html?with=${otroId}&name=${encodeURIComponent(otroNombre)}`; }, 1200);
  }

  document.getElementById('btnColgar').addEventListener('click', () => {
    if(canal) canal.send({ type: 'broadcast', event: 'colgar', payload: {} });
    finalizarLlamada(false);
  });

  document.getElementById('btnMic').addEventListener('click', function(){
    this.classList.toggle('activo');
    if(streamLocal) streamLocal.getAudioTracks().forEach(t => t.enabled = !this.classList.contains('activo'));
  });
  document.getElementById('btnCam').addEventListener('click', function(){
    this.classList.toggle('activo');
    if(streamLocal) streamLocal.getVideoTracks().forEach(t => t.enabled = this.classList.contains('activo'));
  });
</script>
</body>
</html>
