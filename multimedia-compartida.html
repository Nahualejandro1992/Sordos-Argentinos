<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Sordos Argentinos — Multimedia compartida</title>
<style>
  :root{ --violeta-bg:#050014; --magenta:#ff2ec4; --cian:#17f2ff; --texto:#f4e9ff; --texto-dim:#b79ad1; --amarillo:#f6b40e; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:var(--violeta-bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #app{ position:fixed; inset:0; width:100vw; height:100dvh;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); overflow:hidden; background:var(--violeta-bg); }
  .fondo-aurora{ position:absolute; inset:0; z-index:0; pointer-events:none;
    background:linear-gradient(120deg, transparent 0%, #7209b7 20%, transparent 40%, #4361ee 60%, transparent 80%, var(--cian) 100%);
    background-size:300% 300%; opacity:.15; animation:auroraMove 9s ease-in-out infinite; }
  @keyframes auroraMove{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
  @media (prefers-reduced-motion: reduce){ .fondo-aurora{ animation:none; } }

  .pantalla{ position:absolute; inset:0; z-index:1; display:flex; flex-direction:column; }
  .header{ display:flex; align-items:center; gap:10px; padding:10px 8px; flex-shrink:0; }
  .btn-atras{ width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.05); }
  .btn-atras svg{ width:20px; height:20px; color:var(--texto); }
  .header h2{ font-size:16.5px; font-weight:800; color:var(--texto); }

  .tabs{ display:flex; gap:6px; padding:4px 20px 10px; flex-shrink:0; }
  .tab-mm{ flex:1; text-align:center; min-height:38px; display:flex; align-items:center; justify-content:center; gap:6px;
    border-radius:12px; background:rgba(255,255,255,.04); color:var(--texto-dim); font-size:12.5px; font-weight:700; }
  .tab-mm.activo{ background:linear-gradient(135deg,var(--magenta),var(--cian)); color:#fff; }
  .tab-mm .cant{ font-size:10.5px; opacity:.85; }

  .contenido-wrap{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 20px 30px; }

  .fecha-titulo{ font-size:12px; font-weight:700; color:var(--texto-dim); letter-spacing:.5px; text-transform:uppercase; margin:16px 0 8px; }
  .fecha-titulo:first-child{ margin-top:4px; }

  .grid-media{ display:grid; grid-template-columns:repeat(3, 1fr); gap:4px; }
  .item-media{ aspect-ratio:1; border-radius:8px; overflow:hidden; position:relative; background:#150022; }
  .item-media img{ width:100%; height:100%; object-fit:cover; }
  .item-media .badge-video{ position:absolute; bottom:5px; right:5px; width:20px; height:20px; border-radius:50%;
    background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; }
  .item-media .badge-video svg{ width:10px; height:10px; color:#fff; }
  .item-media .dur-video{ position:absolute; bottom:5px; left:5px; font-size:9px; font-weight:700; color:#fff;
    background:rgba(0,0,0,.5); padding:1px 5px; border-radius:5px; }

  .lista-docs{ display:flex; flex-direction:column; gap:8px; }
  .item-doc{ display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px; background:rgba(255,255,255,.04); }
  .icono-doc{ width:40px; height:40px; border-radius:10px; background:rgba(246,180,14,.14); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .icono-doc svg{ width:19px; height:19px; color:var(--amarillo); }
  .info-doc{ flex:1; min-width:0; }
  .nombre-doc{ font-size:13.5px; font-weight:700; color:var(--texto); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .meta-doc{ margin-top:2px; font-size:11.5px; color:var(--texto-dim); }

  .vacio{ margin-top:60px; text-align:center; padding:0 30px; }
  .vacio .icono{ width:64px; height:64px; margin:0 auto; border-radius:50%; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; }
  .vacio .icono svg{ width:28px; height:28px; color:var(--texto-dim); }
  .vacio p{ margin-top:16px; font-size:13.5px; color:var(--texto-dim); }

  /* ===== visor de foto en pantalla completa ===== */
  .visor{ position:fixed; inset:0; background:#000; z-index:20; display:flex; flex-direction:column;
    opacity:0; pointer-events:none; transition:opacity .2s ease; }
  .visor.activo{ opacity:1; pointer-events:auto; }
  .visor-header{ display:flex; align-items:center; justify-content:space-between; padding:calc(10px + env(safe-area-inset-top)) 16px 10px; }
  .visor-header .btn-icono{ width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; }
  .visor-header .btn-icono svg{ width:19px; height:19px; color:#fff; }
  .visor-img-wrap{ flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .visor-img-wrap img{ max-width:100%; max-height:100%; object-fit:contain; }
</style>
</head>
<body>
<div id="app">
  <div class="fondo-aurora"></div>
  <div class="pantalla">
    <div class="header">
      <div class="btn-atras" id="btnAtras"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div>
      <h2>gonza_lp</h2>
    </div>

    <div class="tabs">
      <div class="tab-mm activo" data-tab="fotos">Fotos y videos <span class="cant">(9)</span></div>
      <div class="tab-mm" data-tab="docs">Documentos <span class="cant">(2)</span></div>
      <div class="tab-mm" data-tab="enlaces">Enlaces <span class="cant">(3)</span></div>
    </div>

    <div class="contenido-wrap" id="contenido"></div>
  </div>

  <div class="visor" id="visor">
    <div class="visor-header">
      <div class="btn-icono" id="btnCerrarVisor"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></div>
      <div class="btn-icono" id="btnCompartirVisor"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7M16 6l-4-4-4 4M12 2v14"/></svg></div>
    </div>
    <div class="visor-img-wrap"><img id="visorImg" src="" alt=""></div>
  </div>
</div>

<script>
  let fotos = [];
  let documentos = [];
  let sb = null, miId = null, otroId = null;

  const params = new URLSearchParams(window.location.search);
  otroId = params.get('id') || params.get('with');

  function cargarScriptConFallback(urls, callback){
    let i = 0;
    function intentar(){
      if(i >= urls.length){ callback(false); return; }
      const s = document.createElement('script');
      s.src = urls[i];
      s.onload = () => callback(true);
      s.onerror = () => { i++; intentar(); };
      document.head.appendChild(s);
    }
    intentar();
  }

  function avisarBannerMM(texto){
    let b = document.getElementById('bannerDiagnosticoMM');
    if(!b){
      b = document.createElement('div');
      b.id = 'bannerDiagnosticoMM';
      b.style.cssText = 'position:fixed; top:0; left:0; right:0; z-index:999; background:#ff2d3f; color:#fff; padding:calc(10px + env(safe-area-inset-top)) 16px 10px; font-size:12.5px; font-family:sans-serif; text-align:center; line-height:1.5;';
      document.body.prepend(b);
    }
    b.textContent = texto;
  }

  function fechaGrupoMM(fechaISO){
    const fecha = new Date(fechaISO);
    const hoy = new Date();
    const ayer = new Date(); ayer.setDate(hoy.getDate() - 1);
    const esMismoDia = (a,b) => a.toDateString() === b.toDateString();
    if(esMismoDia(fecha, hoy)) return 'hoy';
    if(esMismoDia(fecha, ayer)) return 'ayer';
    return 'semana';
  }

  cargarScriptConFallback([
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
    'https://unpkg.com/@supabase/supabase-js@2'
  ], async (exito) => {
    if(!exito || typeof supabase === 'undefined'){
      avisarBannerMM('⚠️ No se pudo cargar la conexión a Supabase.');
      return;
    }
    sb = supabase.createClient(
      'https://slidcibxmsfhssbdihou.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsaWRjaWJ4bXNmaHNzYmRpaG91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzIyMDksImV4cCI6MjA5OTU0ODIwOX0.n0Glud1XevxP1BChN7r4lc49lqDa9WJxH6RI32HhLnI'
    );
    const { data: sesionData } = await sb.auth.getSession();
    if(!sesionData.session){
      avisarBannerMM('⚠️ Necesitás iniciar sesión primero. Te llevamos al login...');
      setTimeout(() => window.location.href = 'login.html', 1500);
      return;
    }
    miId = sesionData.session.user.id;

    if(!otroId){
      avisarBannerMM('⚠️ Falta saber de qué chat se trata (falta ?id= en la URL).');
      return;
    }

    const { data: perfilOtro } = await sb.from('profiles').select('name').eq('id', otroId).single();
    if(perfilOtro) document.querySelector('.header h2').textContent = perfilOtro.name;

    const { data, error } = await sb
      .from('messages')
      .select('id, content, attachment_url, attachment_type, created_at')
      .or(`and(sender_id.eq.${miId},receiver_id.eq.${otroId}),and(sender_id.eq.${otroId},receiver_id.eq.${miId})`)
      .not('attachment_url', 'is', null)
      .order('created_at', { ascending: false });

    if(error){ avisarBannerMM('Error cargando multimedia: ' + error.message); return; }

    fotos = (data || []).filter(f => f.attachment_type === 'image' || f.attachment_type === 'view_once').map(f => ({
      id: f.id, fecha: fechaGrupoMM(f.created_at), img: f.attachment_url
    }));
    documentos = (data || []).filter(f => f.attachment_type === 'file').map(f => ({
      id: f.id, nombre: f.content || 'archivo', peso: '', fecha: new Date(f.created_at).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}), url: f.attachment_url
    }));

    if(tabActiva === 'fotos') renderFotos();
  });

  const nombresFecha = { hoy:'Hoy', ayer:'Ayer', semana:'Esta semana' };
  const iconoVideo = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9V3Z"/></svg>`;
  const iconoDoc = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>`;
  const iconoLink = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1.5-1.5"/></svg>`;

  const contenido = document.getElementById('contenido');
  let tabActiva = 'fotos';

  function renderFotos(){
    contenido.innerHTML = '';
    if(fotos.length === 0){
      contenido.innerHTML = vacioHTML('No hay fotos ni videos compartidos en este chat todavía.');
      return;
    }
    ['hoy','ayer','semana'].forEach(f => {
      const grupo = fotos.filter(x => x.fecha === f);
      if(grupo.length === 0) return;
      const titulo = document.createElement('div');
      titulo.className = 'fecha-titulo';
      titulo.textContent = nombresFecha[f];
      contenido.appendChild(titulo);

      const grid = document.createElement('div');
      grid.className = 'grid-media';
      grupo.forEach(item => {
        const el = document.createElement('div');
        el.className = 'item-media';
        el.innerHTML = `
          <img src="${item.img}" alt="">
          ${item.video ? `<div class="dur-video">${item.dur}</div><div class="badge-video">${iconoVideo}</div>` : ''}
        `;
        el.addEventListener('click', () => abrirVisor(item.img));
        grid.appendChild(el);
      });
      contenido.appendChild(grid);
    });
  }

  function renderDocs(){
    contenido.innerHTML = '';
    if(documentos.length === 0){
      contenido.innerHTML = vacioHTML('No hay documentos compartidos en este chat.');
      return;
    }
    const lista = document.createElement('div');
    lista.className = 'lista-docs';
    lista.style.marginTop = '10px';
    documentos.forEach(d => {
      const el = document.createElement('div');
      el.className = 'item-doc';
      el.innerHTML = `
        <div class="icono-doc">${iconoDoc}</div>
        <div class="info-doc">
          <div class="nombre-doc">${d.nombre}</div>
          <div class="meta-doc">${d.peso} · ${d.fecha}</div>
        </div>
      `;
      el.addEventListener('click', () => { if(d.url) window.open(d.url, '_blank'); });
      lista.appendChild(el);
    });
    contenido.appendChild(lista);
  }

  function renderEnlaces(){
    contenido.innerHTML = vacioHTML('Todavía no rastreamos enlaces compartidos automáticamente.');
    return;
    const enlaces = [];
    const lista = document.createElement('div');
    lista.className = 'lista-docs';
    lista.style.marginTop = '10px';
    enlaces.forEach(e => {
      const el = document.createElement('div');
      el.className = 'item-doc';
      el.innerHTML = `
        <div class="icono-doc" style="background:rgba(23,242,255,.14);"><span style="color:var(--cian);">${iconoLink}</span></div>
        <div class="info-doc">
          <div class="nombre-doc">${e.url}</div>
          <div class="meta-doc">${e.fecha}</div>
        </div>
      `;
      lista.appendChild(el);
    });
    contenido.appendChild(lista);
  }

  function vacioHTML(texto){
    return `<div class="vacio">
      <div class="icono"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>
      <p>${texto}</p>
    </div>`;
  }

  function renderTab(){
    if(tabActiva === 'fotos') renderFotos();
    else if(tabActiva === 'docs') renderDocs();
    else renderEnlaces();
  }
  renderTab();

  document.querySelectorAll('.tab-mm').forEach(tab => {
    tab.addEventListener('click', () => {
      tabActiva = tab.dataset.tab;
      document.querySelectorAll('.tab-mm').forEach(t => t.classList.toggle('activo', t === tab));
      renderTab();
    });
  });

  // ===== visor de foto =====
  const visor = document.getElementById('visor');
  const visorImg = document.getElementById('visorImg');
  function abrirVisor(src){
    visorImg.src = src;
    visor.classList.add('activo');
  }
  document.getElementById('btnCerrarVisor').addEventListener('click', () => visor.classList.remove('activo'));
  document.getElementById('btnCompartirVisor').addEventListener('click', () => console.log('compartir/guardar foto'));

  document.getElementById('btnAtras').addEventListener('click', () => { window.history.back(); });
</script>
</body>
</html>
